<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《数据挖掘与分析》— 湖南工业大学数字化教材</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b1622;
            --bg-surface: #141f2e;
            --bg-card: #1a2a3d;
            --gold: #c9a96e;
            --gold-light: #dcc090;
            --gold-dim: #8b7348;
            --text-primary: #e8e0d0;
            --text-secondary: #a09888;
            --text-muted: #6b6560;
            --border: #1e3048;
            --border-gold: rgba(201,169,110,0.25);
            --radius: 12px;
            --radius-lg: 18px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 20%, rgba(201,169,110,0.03) 0%, transparent 50%);
        }

        /* --- Header --- */
        .main-header {
            background: linear-gradient(180deg, #111d2e 0%, #0d1825 100%);
            border-bottom: 1px solid var(--border-gold);
            padding: 2.5rem 0 0;
            position: relative;
            overflow: hidden;
        }
        .main-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(201,169,110,0.06) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(201,169,110,0.04) 0%, transparent 40%);
            pointer-events: none;
        }
        /* Subtle dot grid pattern */
        .main-header::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: radial-gradient(circle, #c9a96e 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }
        .header-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 6px;
        }
        .header-ornament {
            width: 40px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .main-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #e8d5a3 0%, #c9a96e 40%, #a07838 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-align: center;
        }
        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 6px;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        /* --- Navigation --- */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 0;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 1rem 1.8rem;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            letter-spacing: 1px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 20%; right: 20%;
            height: 2px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link:hover { color: var(--gold-light); }
        .nav-link:hover::after { transform: scaleX(1); }
        .nav-link.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
            text-shadow: 0 0 20px rgba(201,169,110,0.3);
        }
        .nav-link.active::after { transform: scaleX(1); }
        .nav-icon {
            width: 18px; height: 18px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .nav-link.active .nav-icon,
        .nav-link:hover .nav-icon { opacity: 1; }

        /* --- Content --- */
        .main-content {
            flex: 1;
            display: flex;
            background: radial-gradient(ellipse at 50% 0%, rgba(20,31,46,0.8) 0%, var(--bg-deep) 60%);
        }
        .content-frame {
            width: 100%;
            border: none;
            min-height: calc(100vh - 280px);
        }

        /* --- Footer --- */
        .main-footer {
            background: #0a1019;
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 1.8rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .footer-ornament {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 0 auto 1rem;
        }

        @media (max-width: 768px) {
            .main-title { font-size: 1.6rem; letter-spacing: 1px; }
            .subtitle { font-size: 0.8rem; letter-spacing: 3px; }
            .nav-link { padding: 0.7rem 1rem; font-size: 0.85rem; }
            .nav-bar { gap: 0; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-ornament" style="margin: 0 auto 16px;"></div>
            <h1 class="main-title">《数据挖掘与分析》</h1>
            <p class="subtitle">湖南工业大学 · 数字化教材配套网站</p>
            <nav>
                <ul class="nav-bar">
                    <li><a class="nav-link active" data-page="knowledge" href="#knowledge">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        知识点
                    </a></li>
                    <li><a class="nav-link" data-page="exercises" href="#exercises">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                        练习题
                    </a></li>
                    <li><a class="nav-link" data-page="about" href="#about">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        关于本书
                    </a></li>
                    <li><a class="nav-link" data-page="outline" href="#outline">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        在线教材大纲
                    </a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <iframe id="content-frame" class="content-frame" src="knowledge-content.html"></iframe>
    </main>

    <footer class="main-footer">
        <div class="footer-ornament"></div>
        <p>2026 湖南工业大学 &nbsp;·&nbsp; 数据挖掘与分析数字化教材</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var navLinks = Array.from(document.querySelectorAll('.nav-link'));
            var contentFrame = document.getElementById('content-frame');
            var validPages = { knowledge: true, exercises: true, about: true, outline: true };

            function applyActive(page) {
                navLinks.forEach(function(a) {
                    a.classList.toggle('active', a.dataset.page === page);
                });
            }

            function loadFromHash() {
                var page = (location.hash || '').replace(/^#/, '') || 'knowledge';
                if (!validPages[page]) page = 'knowledge';
                contentFrame.src = page + '-content.html';
                applyActive(page);
            }

            navLinks.forEach(function(a) {
                a.addEventListener('click', function (e) {
                    e.preventDefault();
                    var page = this.dataset.page;
                    if (location.hash !== '#' + page) {
                        location.hash = page;
                    } else {
                        loadFromHash();
                    }
                });
            });

            window.addEventListener('hashchange', loadFromHash);
            loadFromHash();
        });
    </script>
</body>
</html>
